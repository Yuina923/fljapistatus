<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at 30% 30%, rgba(120,0,255,0.25), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(0,150,255,0.2), transparent 40%),
        radial-gradient(ellipse at bottom, #0d1b2a 0%, #000 100%);
}

.stars {
    position:fixed;
    width:100%;
    height:100%;
}

.star {
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 4s infinite alternate ease-in-out;
}

@keyframes twinkle {
    from { opacity:0.3; }
    to { opacity:1; }
}

.meteor {
    position: absolute;
    width: 160px;
    height: 2px;
    background: linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,1)
    );
    transform: rotate(45deg);
    transform-origin: left center;
    animation: fall linear forwards;
}

.meteor::after {
    content: "";
    position: absolute;
    right: -3px;
    top: -2px;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 12px white, 0 0 25px white;
}

@keyframes fall {
    0% {
        transform: translate(-200px, -200px) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translate(120vw, 120vh) rotate(45deg);
        opacity: 0;
    }
}

.container {
    position:relative;
    text-align:center;
    z-index:10;
}

h1 {
    font-size:3rem;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { text-shadow:0 0 10px #00bfff; }
    to { text-shadow:0 0 25px #00ffff; }
}

.countdown {
    margin-top:25px;
    font-size:1.8rem;
    color:#00ffff;
}

.upcoming {
    margin-top:18px;
    text-align:left;
    max-width:520px;
}

.upcoming h2 {
    font-size:1.1rem;
    margin-bottom:8px;
    color:#9ae6ff;
}

.upcoming ul {
    list-style:none;
    padding:0;
    margin:0;
}

.upcoming li {
    margin:6px 0;
    color:#dff7ff;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
    <h1>API メンテナンス</h1>
    <p>現在メンテナンスは実施されていません。</p>
    <div class="upcoming" id="upcoming">
        <h2>今後のメンテナンス予定</h2>
        <ul id="upcomingList"></ul>
    </div>
</div>

<script>

const starsContainer = document.getElementById("stars");

for (let i = 0; i < 60; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (Math.random() * 4 + 2) + "s";
    starsContainer.appendChild(star);
}

// 背景の流星
function createMeteor() {
    const meteor = document.createElement("div");
    meteor.className = "meteor";
    meteor.style.left = Math.random() * window.innerWidth + "px";
    meteor.style.top = "-150px";
    meteor.style.animationDuration = (Math.random() * 4 + 6) + "s";
    document.body.appendChild(meteor);
    setTimeout(() => meteor.remove(), 10000);
}

setInterval(createMeteor, 2000);

const maintenanceSchedules = [
    {
        start: "2026-03-02T15:00:00+09:00",
        end: "2026-03-02T17:30:00+09:00",
        note: "定期メンテナンス"
    },
    //{
        //start: "2026-03-12T02:00:00+09:00",
        //end: "2026-03-12T04:30:00+09:00",
        //note: "データベース最適化"
    //},
    //{
        //start: "2026-03-19T01:30:00+09:00",
        //end: "2026-03-19T03:00:00+09:00",
        //note: "ネットワーク機器更新"
    //}
];

const upcomingListEl = document.getElementById("upcomingList");

function formatJst(dateValue) {
    return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
    }).format(new Date(dateValue));
}

function renderUpcomingSchedules() {
    const now = new Date();
    const upcoming = maintenanceSchedules.filter((schedule) => new Date(schedule.end) > now);

    if (upcoming.length === 0) {
        upcomingListEl.innerHTML = "<li>現在、今後のメンテナンス予定はありません。</li>";
        return;
    }

    upcomingListEl.innerHTML = upcoming
        .sort((a, b) => new Date(a.start) - new Date(b.start))
        .map(
            (schedule) =>
                `<li>${formatJst(schedule.start)} 〜 ${formatJst(schedule.end)}（${schedule.note}）</li>`
        )
        .join("");
}

renderUpcomingSchedules();
</script>

</body>
</html>
